/* themes/atelier-ling/theme.css */
/* ============================================================
   THEME · Atelier Ling 凌晨製作所
   深夜手作烘焙 — 法式職人 × 深夜工作室 × 紀實感
   (late-night handmade bakery — French artisan × midnight
    studio × documentary feel)

   This file overrides ONLY the skinnable semantic tokens inside
   one scope. It changes nothing about the core components — drop
   data-theme="atelier-ling" on <html> (or any wrapper) and the
   whole mother system re-skins.

   Palette:  暖白底 · 深夜藍黑 · 烤箱金棕 · 麵團米色
   Radius:   0  (完全方正 — artisanal, no rounding)
   Heading:  fine Cormorant serif   Body: Inter-grotesque
   Photo:    documentary — warm, lightly desaturated, a touch dark
   ============================================================ */

[data-theme="atelier-ling"] {
  /* ── COLOR ── */
  /* 暖白底 — warm dough-paper ground */
  --c-bg:        #EFE7D7;
  --c-surface:   #F6F0E3;
  --c-surface-2: #E2D6BE;   /* 麵團米色 dough beige */

  /* text — 深夜藍黑 midnight blue-black, not pure black */
  --c-text:        #19222F;
  --c-text-muted:  #4C5666;
  --c-text-subtle: #8A8475;

  /* primary — 深夜藍黑 (dark buttons read midnight, not charcoal) */
  --c-primary:       #182331;
  --c-primary-hover: #0E1620;
  --c-on-primary:    #EFE7D7;

  /* secondary — 麵團米色 dough, for soft fills on dark */
  --c-secondary:    #C9B68F;
  --c-on-secondary: #182331;

  /* accent — 烤箱金棕 oven gold-brown */
  --c-accent:       #AE6E2E;
  --c-accent-hover: #8E561F;
  --c-on-accent:    #F6F0E3;

  /* lines & focus */
  --c-border:        #DBCDB2;
  --c-border-strong: #C2AE89;
  --c-ring:          #AE6E2E;

  /* status — tuned warm to sit on dough paper */
  --c-success:    #5C6B4A;  --c-success-bg: #E4E5CE;
  --c-warning:    #97681B;  --c-warning-bg: #EFE2C4;
  --c-danger:     #97402A;  --c-danger-bg:  #EBDBCF;
  --c-info:       #3E4F60;  --c-info-bg:    #DCE2E4;

  /* ── FONT ── */
  --font-heading: "Cormorant Garamond", "Noto Serif TC", Georgia, serif;
  --font-body:    "Inter", "Noto Sans TC", -apple-system, "Segoe UI", sans-serif;
  --font-heading-scale: 1.04;

  /* ── RADIUS ── 0 = 完全方正 artisanal */
  --radius: 0px;

  /* ── PHOTO TONE ── documentary: warm, lightly desaturated, dim */
  --photo-filter: saturate(0.86) contrast(1.05) brightness(0.96) sepia(0.08); /* @kind other */
  --photo-bg: #2A3340;
}

/**
 * Hearth Studio — Button (Core)
 * Theme-driven action. Reads only semantic tokens, so it re-skins with
 * the active [data-theme]. Padding/height follow the active density.
 */
function Button({
  variant = "primary",
  size = "md",
  iconLeft = null,
  iconRight = null,
  full = false,
  disabled = false,
  type = "button",
  onClick,
  children,
  style = {},
  ...rest
}) {
  const [hover, setHover] = React.useState(false);
  const [active, setActive] = React.useState(false);

  // size tweaks ride on top of density-driven control height
  const sizePad = { sm: "0 0.95rem", md: "0 var(--pad-control-x)", lg: "0 calc(var(--pad-control-x) + 0.5rem)" };
  const sizeH = { sm: "calc(var(--control-h) - 8px)", md: "var(--control-h)", lg: "calc(var(--control-h) + 8px)" };
  const sizeFont = { sm: "var(--text-sm)", md: "0.95rem", lg: "var(--text-lead)" };

  const palettes = {
    primary: { bg: "var(--c-primary)", bgH: "var(--c-primary-hover)", fg: "var(--c-on-primary)", bd: "transparent" },
    accent:  { bg: "var(--c-accent)",  bgH: "var(--c-accent-hover)",  fg: "var(--c-on-accent)",  bd: "transparent" },
    outline: { bg: hover ? "var(--c-surface-2)" : "transparent", bgH: "var(--c-surface-2)", fg: "var(--c-text)", bd: "var(--c-border-strong)" },
    ghost:   { bg: hover ? "var(--c-surface-2)" : "transparent", bgH: "var(--c-surface-2)", fg: "var(--c-accent)", bd: "transparent" },
  };
  const p = palettes[variant] || palettes.primary;

  return (
    <button
      type={type}
      disabled={disabled}
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => { setHover(false); setActive(false); }}
      onMouseDown={() => setActive(true)}
      onMouseUp={() => setActive(false)}
      style={{
        display: full ? "flex" : "inline-flex",
        width: full ? "100%" : "auto",
        alignItems: "center",
        justifyContent: "center",
        gap: "0.55rem",
        height: sizeH[size],
        padding: sizePad[size],
        fontFamily: "var(--font-body)",
        fontSize: sizeFont[size],
        fontWeight: "var(--fw-semibold)",
        letterSpacing: "0.01em",
        lineHeight: 1,
        whiteSpace: "nowrap",
        color: p.fg,
        background: active && !disabled ? p.bgH : p.bg,
        border: `1px solid ${p.bd}`,
        borderRadius: "var(--radius-control)",
        cursor: disabled ? "not-allowed" : "pointer",
        opacity: disabled ? 0.42 : 1,
        transform: active && !disabled ? "translateY(0.5px)" : "none",
        transition: "background var(--dur-1) var(--ease-out), transform var(--dur-1) var(--ease-out), color var(--dur-1) var(--ease-out)",
        userSelect: "none",
        ...style,
      }}
      {...rest}
    >
      {iconLeft ? <span style={{ display: "inline-flex" }}>{iconLeft}</span> : null}
      {children}
      {iconRight ? <span style={{ display: "inline-flex" }}>{iconRight}</span> : null}
    </button>
  );
}

/**

 * Centered dialog with a scrim. Theme-driven surface, corners and motion.
 * Closes on scrim click and Esc. Renders nothing when closed.

function Modal({
  open = false,
  onClose,
  title = null,
  footer = null,
  width = 460,
  children,
}) {
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape" && onClose) onClose(); };

    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);

  if (!open) return null;

  return (
    <div
      role="dialog"
      aria-modal="true"
      onClick={onClose}
      style={{
        position: "fixed", inset: 0, zIndex: "var(--z-modal)",
        display: "flex", alignItems: "center", justifyContent: "center",

/**
 * Hearth Studio — StatusBadge (Hospitality)
 * Availability / lifecycle state across all three interaction modes:
 * Reservation (訂位), Booking (訂房), Pre-order & Pickup (預訂取貨).
 * Bilingual labels baked in; pass `label` to override.
 */
const STATUS = {
  // ── Generic / Reservation (訂位) ──
  available: { tone: "success", dot: true,  label: "可預約 Available" },
  limited:   { tone: "warning", dot: true,  label: "僅剩少量 Limited" },
  soldout:   { tone: "danger",  dot: false, label: "售完 Sold out" },
  full:      { tone: "danger",  dot: false, label: "額滿 Fully booked" },
  comingsoon:{ tone: "info",    dot: false, label: "即將開放 Coming soon" },
  confirmed: { tone: "success", dot: true,  label: "已確認 Confirmed" },
  cancelled: { tone: "danger",  dot: false, label: "已取消 Cancelled" },

  // ── Booking (訂房) ──
  bookable:  { tone: "success", dot: true,  label: "可訂房 Available" },
  checkedin: { tone: "info",    dot: true,  label: "已入住 Checked in" },

  // ── Pre-order & Pickup (預訂取貨) ──
  accepting:    { tone: "success", dot: true,  label: "接受預訂中 Accepting orders" },
  almostfull:   { tone: "warning", dot: true,  label: "名額將滿 Almost full" },
  closed:       { tone: "neutral", dot: false, label: "預訂截止 Orders closed" },
  making:       { tone: "info",    dot: true,  label: "製作中 In the oven" },
  ready:        { tone: "success", dot: false, label: "可取貨 Ready for pickup" },
  done:         { tone: "neutral", dot: false, label: "已完成 Completed" },
  whilestockslast: { tone: "warning", dot: false, label: "售完即止 While stocks last" },
};

function StatusBadge({ status = "available", label, solid, style = {}, ...rest }) {
  const s = STATUS[status] || STATUS.available;
  const tones = {
    neutral: ["var(--c-surface-2)", "var(--c-text-muted)", "var(--c-text-muted)"],
    success: ["var(--c-success-bg)", "var(--c-success)", "var(--c-success)"],
    warning: ["var(--c-warning-bg)", "var(--c-warning)", "var(--c-warning)"],
    danger:  ["var(--c-danger-bg)",  "var(--c-danger)",  "var(--c-danger)"],
    info:    ["var(--c-info-bg)",    "var(--c-info)",    "var(--c-info)"],

  const [bg, fg, solidBg] = tones[s.tone];

  return (

      }}
      {...rest}

      {label ?? s.label}

/**
 * Hearth Studio — Countdown (Hospitality)
 * Counts down to a target time — limited bakes, event reservations.
 * Shows D/H/M/S blocks; calls onComplete once when it reaches zero.
 */
function Countdown({
  to,
  labels = ["天", "時", "分", "秒"],
  onComplete,
  compact = false,
  style = {},
}) {
  const target = React.useMemo(() => new Date(to).getTime(), [to]);
  const calc = React.useCallback(() => Math.max(0, target - Date.now()), [target]);
  const [ms, setMs] = React.useState(calc);
  const fired = React.useRef(false);

  React.useEffect(() => {
    const id = setInterval(() => {
      const next = calc();
      setMs(next);
      if (next === 0 && !fired.current) { fired.current = true; onComplete && onComplete(); }
    }, 1000);
    return () => clearInterval(id);
  }, [calc, onComplete]);

  const s = Math.floor(ms / 1000);
  const parts = [Math.floor(s / 86400), Math.floor((s % 86400) / 3600), Math.floor((s % 3600) / 60), s % 60];
  const pad = (n) => String(n).padStart(2, "0");

  return (
    <div style={{ display: "inline-flex", alignItems: "flex-end", gap: compact ? "0.5rem" : "0.9rem", fontFamily: "var(--font-body)", ...style }}>
      {parts.map((n, i) => (
        <React.Fragment key={i}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", minWidth: compact ? 28 : 44 }}>
            <span style={{
              fontFamily: "var(--font-heading)", fontWeight: "var(--fw-semibold)",
              fontSize: compact ? "var(--text-h4)" : "var(--text-h2)", lineHeight: 1,
              color: "var(--c-text)", fontVariantNumeric: "tabular-nums",
            }}>{pad(n)}</span>

/**
 * Hearth Studio — DatePicker (Hospitality)
 * Single-month calendar for booking dates. Disables past days and any in
 * `disabledDates`/`fullDates`. Theme-driven; square cells in artisanal themes.
 */
const WEEK_ZH = ["一", "二", "三", "四", "五", "六", "日"];

function DatePicker({
  value,
  onChange,
  month,                 // Date controlling the visible month
  onMonthChange,
  minDate = new Date(),
  fullDates = [],        // ISO yyyy-mm-dd strings marked 額滿
  disabledDates = [],
  style = {},
}) {
  const [viewInternal, setViewInternal] = React.useState(() => startOfMonth(month || value || new Date()));
  const view = month ? startOfMonth(month) : viewInternal;
  const setView = (d) => { if (onMonthChange) onMonthChange(d); if (!month) setViewInternal(d); };

  const iso = (d) => d.toISOString().slice(0, 10);
  const min = stripTime(minDate);
  const selISO = value ? iso(stripTime(new Date(value))) : null;

  const first = new Date(view.getFullYear(), view.getMonth(), 1);
  const startPad = (first.getDay() + 6) % 7; // Monday-first
  const daysIn = new Date(view.getFullYear(), view.getMonth() + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startPad; i++) cells.push(null);
  for (let d = 1; d <= daysIn; d++) cells.push(new Date(view.getFullYear(), view.getMonth(), d));

  const monthLabel = `${view.getFullYear()} 年 ${view.getMonth() + 1} 月`;
  const navBtn = {
    border: "1px solid var(--c-border-strong)", background: "var(--c-surface)",
    width: 32, height: 32, cursor: "pointer", color: "var(--c-text)",
    borderRadius: "var(--radius-control)", fontSize: "1rem", lineHeight: 1,
  };

  return (
    <div style={{ fontFamily: "var(--font-body)", width: 300, ...style }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "0.75rem" }}>
        <button type="button" aria-label="Previous month" style={navBtn}
          onClick={() => setView(new Date(view.getFullYear(), view.getMonth() - 1, 1))}>‹</button>
        <span style={{ fontFamily: "var(--font-heading)", fontWeight: "var(--fw-semibold)", fontSize: "var(--text-h4)", color: "var(--c-text)", whiteSpace: "nowrap" }}>{monthLabel}</span>
        <button type="button" aria-label="Next month" style={navBtn}
          onClick={() => setView(new Date(view.getFullYear(), view.getMonth() + 1, 1))}>›</button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 4 }}>
        {WEEK_ZH.map((w) => (
          <div key={w} style={{ textAlign: "center", fontSize: "var(--text-xs)", color: "var(--c-text-subtle)", padding: "2px 0" }}>{w}</div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} />;
          const dISO = iso(d);
          const isPast = stripTime(d) < min;
          const isFull = fullDates.includes(dISO);
          const isDisabled = isPast || isFull || disabledDates.includes(dISO);
          const isSel = selISO === dISO;
          return (
            <button
              key={i}
              type="button"
              disabled={isDisabled}
              onClick={() => onChange && onChange(d)}
              aria-pressed={isSel}
              title={isFull ? "額滿 Fully booked" : undefined}
              style={{
                position: "relative",
                aspectRatio: "1", border: "1px solid",
                borderColor: isSel ? "var(--c-primary)" : "transparent",
                background: isSel ? "var(--c-primary)" : "transparent",
                color: isSel ? "var(--c-on-primary)" : isDisabled ? "var(--c-text-subtle)" : "var(--c-text)",
                opacity: isPast ? 0.35 : 1,
                cursor: isDisabled ? "not-allowed" : "pointer",
                borderRadius: "var(--radius-control)",
                fontFamily: "var(--font-body)", fontSize: "var(--text-sm)",
                textDecoration: isFull ? "line-through" : "none",
                transition: "background var(--dur-1) var(--ease-out), border-color var(--dur-1) var(--ease-out)",
              }}
            >
              {d.getDate()}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function startOfMonth(d) { const x = new Date(d); return new Date(x.getFullYear(), x.getMonth(), 1); }
function stripTime(d) { const x = new Date(d); x.setHours(0, 0, 0, 0); return x; }

/**
 * Hearth Studio — ReservationForm (Hospitality)
 * Full booking flow: date (calendar) · party size · time slot · notes.
 * Shows a confirmed state on submit. Reads only semantic tokens.
 */
function ReservationForm({
  times = ["12:00", "12:30", "18:00", "18:30", "19:00", "20:00"],
  fullDates = [],
  fullTimes = [],
  maxParty = 8,
  onSubmit,
  style = {},
}) {
  const [date, setDate] = React.useState(null);
  const [party, setParty] = React.useState(2);
  const [time, setTime] = React.useState(null);
  const [name, setName] = React.useState("");
  const [notes, setNotes] = React.useState("");
  const [done, setDone] = React.useState(null);

  const fmt = (d) => d ? `${d.getMonth() + 1}/${d.getDate()}` : "—";
  const canSubmit = date && time && name.trim();

  const submit = (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    const booking = { date, party, time, name: name.trim(), notes };
    setDone(booking);
    onSubmit && onSubmit(booking);
  };

  const stepBtn = {
    width: 38, height: "var(--control-h)", border: "1px solid var(--c-border-strong)",
    background: "var(--c-surface)", cursor: "pointer", fontSize: "1.15rem",
    color: "var(--c-text-muted)", borderRadius: "var(--radius-control)",
  };

  if (done) {
    return (
      <div style={{ fontFamily: "var(--font-body)", display: "flex", flexDirection: "column", gap: "1rem", ...style }}>
        <StatusBadge status="confirmed" />
        <h3 style={{ fontFamily: "var(--font-heading)", fontSize: "var(--text-h2)", margin: 0, color: "var(--c-text)" }}>
          {done.name}，已為您保留座位
        </h3>
        <p style={{ margin: 0, color: "var(--c-text-muted)" }}>
          {fmt(done.date)} · {done.time} · {done.party} 位。確認信將寄至您的信箱。
        </p>
        {done.notes ? <p style={{ margin: 0, color: "var(--c-text-subtle)", fontSize: "var(--text-sm)" }}>備註：{done.notes}</p> : null}
        <div><Button variant="outline" size="sm" onClick={() => setDone(null)}>修改訂位</Button></div>
      </div>
    );
  }

  return (
    <form onSubmit={submit} style={{ fontFamily: "var(--font-body)", display: "grid", gridTemplateColumns: "auto 1fr", gap: "var(--space-6)", ...style }}>
      {/* Calendar */}
      <div>
        <FieldLabel>選擇日期 · Date</FieldLabel>
        <DatePicker value={date} onChange={setDate} fullDates={fullDates} />
      </div>

      {/* Right column */}
      <div style={{ display: "flex", flexDirection: "column", gap: "var(--gap-stack)", minWidth: 240 }}>
        <div>
          <FieldLabel>人數 · Party size</FieldLabel>
          <div style={{ display: "inline-flex", alignItems: "center", gap: "0.6rem" }}>
            <button type="button" style={stepBtn} onClick={() => setParty(Math.max(1, party - 1))} aria-label="Fewer">−</button>
            <span style={{ minWidth: 28, textAlign: "center", fontFamily: "var(--font-heading)", fontSize: "var(--text-h4)", color: "var(--c-text)" }}>{party}</span>
            <button type="button" style={stepBtn} onClick={() => setParty(Math.min(maxParty, party + 1))} aria-label="More">+</button>
            <span style={{ fontSize: "var(--text-sm)", color: "var(--c-text-subtle)", marginLeft: "0.25rem" }}>最多 {maxParty} 位</span>
          </div>
        </div>

        <div>
          <FieldLabel>時段 · Time</FieldLabel>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "0.5rem" }}>
            {times.map((t) => {
              const isFull = fullTimes.includes(t);
              const on = time === t;
              return (
                <button
                  key={t}
                  type="button"
                  disabled={isFull}
                  onClick={() => setTime(t)}
                  style={{
                    padding: "0.4rem 0.8rem", cursor: isFull ? "not-allowed" : "pointer",
                    fontFamily: "var(--font-body)", fontSize: "var(--text-sm)", fontWeight: "var(--fw-medium)",
                    color: on ? "var(--c-on-primary)" : isFull ? "var(--c-text-subtle)" : "var(--c-text)",
                    background: on ? "var(--c-primary)" : "transparent",
                    border: `1px solid ${on ? "var(--c-primary)" : "var(--c-border-strong)"}`,
                    borderRadius: "var(--radius-control)",
                    textDecoration: isFull ? "line-through" : "none",
                    transition: "background var(--dur-1) var(--ease-out), color var(--dur-1) var(--ease-out)",
                  }}
                >{t}</button>
              );
            })}
          </div>
        </div>

        <Input label="姓名 · Name" placeholder="王小明" value={name} onChange={(e) => setName(e.target.value)} />

        <div>
          <FieldLabel>需求備註 · Notes</FieldLabel>
          <textarea
            value={notes}
            onChange={(e) => setNotes(e.target.value)}
            rows={2}
            placeholder="高腳椅、過敏原、慶生…"
            style={{
              width: "100%", resize: "vertical", padding: "0.6rem 0.9rem",
              fontFamily: "var(--font-body)", fontSize: "0.95rem", color: "var(--c-text)",
              background: "var(--c-surface)", border: "1px solid var(--c-border-strong)",
              borderRadius: "var(--radius-control)", outline: "none",
            }}
          />
        </div>

        <Button type="submit" variant="primary" full disabled={!canSubmit}>確認訂位 · Confirm</Button>
      </div>
    </form>
  );
}

/**
 * Hearth Studio — PreorderForm 預訂取貨流程 (Pre-order & Pickup)
 * The full flow for drop-based / takeaway / artisan shops:
 *   檔期 drop → 品項 + 數量 → 取貨日期 → 取貨時段 → 取貨方式 → confirm.
 * No dine-in. Confirms into a 製作中 (in-the-oven) state.
 */
function PreorderForm({
  drops = [
    { id: "w26", label: "本週檔期", sub: "6/21（六）出爐" },
    { id: "w27", label: "下週檔期", sub: "6/28（六）出爐" },
  ],
  items = [
    { id: "croissant", name: "深夜可頌", price: 95, note: "27 層奶油" },
    { id: "rye",       name: "裸麥酸種", price: 180, note: "天然酵母" },
    { id: "cinnamon",  name: "焦糖肉桂卷", price: 110, note: "現烤淋醬" },
  ],
  pickupSlots,
  pickupMethods = [
    { id: "self", label: "自取", note: "門市取貨" },
    { id: "delivery", label: "宅配", note: "冷藏宅配，隔日到" },
    { id: "platform", label: "外送平台", note: "Uber / foodpanda" },
  ],
  fullDates = [],
  onSubmit,
  style = {},
}) {
  const [drop, setDrop] = React.useState(drops[0]?.id);
  const [qty, setQty] = React.useState({});
  const [date, setDate] = React.useState(null);
  const [slot, setSlot] = React.useState(null);
  const [method, setMethod] = React.useState(pickupMethods[0]?.id);
  const [name, setName] = React.useState("");
  const [done, setDone] = React.useState(null);

  const setItemQty = (id, d) => setQty((q) => ({ ...q, [id]: Math.max(0, (q[id] || 0) + d) }));
  const lines = items.filter((it) => (qty[it.id] || 0) > 0);
  const count = lines.reduce((n, it) => n + qty[it.id], 0);
  const total = lines.reduce((s, it) => s + qty[it.id] * it.price, 0);
  const selfPickup = method === "self";
  const canSubmit = count > 0 && name.trim() && (!selfPickup || (date && slot));

  const submit = (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    const order = { drop, lines: lines.map((it) => ({ ...it, qty: qty[it.id] })), count, total, date, slot, method, name: name.trim() };
    setDone(order);
    onSubmit && onSubmit(order);
  };

  const stepBtn = {
    width: 32, height: 32, border: "1px solid var(--c-border-strong)", background: "var(--c-surface)",
    cursor: "pointer", fontSize: "1.05rem", color: "var(--c-text-muted)", borderRadius: "var(--radius-control)",
  };

  if (done) {
    const methodLabel = pickupMethods.find((m) => m.id === done.method)?.label;
    return (
      <div style={{ fontFamily: "var(--font-body)", display: "flex", flexDirection: "column", gap: "1rem", ...style }}>

/**
 * Hearth Studio — DateRangePicker (Booking)
 * Two-step range calendar for 入住/退房 (check-in → check-out). First click sets
 * check-in, second sets check-out; clicking again restarts. Highlights the span,
 * disables past days and any in fullDates. Monday-first. Theme-driven.
 */
const WEEK_ZH_R = ["一", "二", "三", "四", "五", "六", "日"];

function DateRangePicker({
  value = {},                  // { start: Date|null, end: Date|null }
  onChange,
  minDate = new Date(),
  fullDates = [],
  months = 1,
  style = {},
}) {
  const [viewBase, setViewBase] = React.useState(() => somR(value.start || new Date()));
  const start = value.start ? stR(new Date(value.start)) : null;
  const end = value.end ? stR(new Date(value.end)) : null;
  const min = stR(minDate);
  const iso = (d) => d.toISOString().slice(0, 10);

  const pick = (d) => {
    const day = stR(d);
    if (!start || (start && end)) { onChange && onChange({ start: day, end: null }); return; }
    if (day <= start) { onChange && onChange({ start: day, end: null }); return; }
    onChange && onChange({ start, end: day });
  };

  const navBtn = {
    border: "1px solid var(--c-border-strong)", background: "var(--c-surface)",
    width: 32, height: 32, cursor: "pointer", color: "var(--c-text)",
    borderRadius: "var(--radius-control)", fontSize: "1rem", lineHeight: 1,
  };

  const renderMonth = (offset) => {
    const view = new Date(viewBase.getFullYear(), viewBase.getMonth() + offset, 1);
    const startPad = (view.getDay() + 6) % 7;
    const daysIn = new Date(view.getFullYear(), view.getMonth() + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < startPad; i++) cells.push(null);
    for (let d = 1; d <= daysIn; d++) cells.push(new Date(view.getFullYear(), view.getMonth(), d));
    return (
      <div key={offset} style={{ width: 280 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "0.75rem" }}>
          {offset === 0
            ? <button type="button" aria-label="Previous" style={navBtn} onClick={() => setViewBase(new Date(viewBase.getFullYear(), viewBase.getMonth() - 1, 1))}>‹</button>
            : <span style={{ width: 32 }} />}
          <span style={{ fontFamily: "var(--font-heading)", fontWeight: "var(--fw-semibold)", fontSize: "var(--text-h4)", color: "var(--c-text)", whiteSpace: "nowrap" }}>
            {view.getFullYear()} 年 {view.getMonth() + 1} 月
          </span>
          {offset === months - 1
            ? <button type="button" aria-label="Next" style={navBtn} onClick={() => setViewBase(new Date(viewBase.getFullYear(), viewBase.getMonth() + 1, 1))}>›</button>
            : <span style={{ width: 32 }} />}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 4 }}>
          {WEEK_ZH_R.map((w) => <div key={w} style={{ textAlign: "center", fontSize: "var(--text-xs)", color: "var(--c-text-subtle)" }}>{w}</div>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>
          {cells.map((d, i) => {
            if (!d) return <div key={i} />;
            const day = stR(d);
            const isPast = day < min;
            const isFull = fullDates.includes(iso(day));
            const disabled = isPast || isFull;
            const isStart = start && +day === +start;
            const isEnd = end && +day === +end;
            const inRange = start && end && day > start && day < end;
            const edge = isStart || isEnd;
            return (
              <button key={i} type="button" disabled={disabled} onClick={() => pick(d)}
                style={{
                  aspectRatio: "1", border: "1px solid",
                  borderColor: edge ? "var(--c-primary)" : "transparent",
                  background: edge ? "var(--c-primary)" : inRange ? "var(--c-surface-2)" : "transparent",
                  color: edge ? "var(--c-on-primary)" : disabled ? "var(--c-text-subtle)" : "var(--c-text)",
                  opacity: isPast ? 0.35 : 1, cursor: disabled ? "not-allowed" : "pointer",
                  borderRadius: "var(--radius-control)", fontFamily: "var(--font-body)", fontSize: "var(--text-sm)",
                  textDecoration: isFull ? "line-through" : "none",
                  transition: "background var(--dur-1) var(--ease-out)",
                }}>
                {d.getDate()}
              </button>
            );
          })}
        </div>
      </div>
    );
  };

  return (
    <div style={{ fontFamily: "var(--font-body)", display: "flex", gap: "var(--space-6)", ...style }}>
      {Array.from({ length: months }, (_, i) => renderMonth(i))}
    </div>
  );
}

function somR(d) { const x = new Date(d); return new Date(x.getFullYear(), x.getMonth(), 1); }
function stR(d) { const x = new Date(d); x.setHours(0, 0, 0, 0); return x; }

/**
 * Hearth Studio — BookingForm 訂房流程 (Booking)
 * Hotel / B&B booking: 入住日–退房日 (date range) · 房型 · 人數 · contact.
 * Computes nights and total. Confirms into a 已確認 state.
 * (Variant skeleton — wire room availability + pricing per property.)
 */
function BookingForm({
  rooms = [
    { id: "std",   name: "標準雙人房", note: "1 大床 · 25㎡", price: 4200, status: "bookable" },
    { id: "dlx",   name: "豪華景觀房", note: "1 大床 · 32㎡ · 城景", price: 5800, status: "bookable" },
    { id: "suite", name: "閣樓套房",   note: "1 大床 + 客廳 · 48㎡", price: 8800, status: "soldout" },
  ],
  fullDates = [],
  maxGuests = 4,
  onSubmit,
  style = {},
}) {
  const [range, setRange] = React.useState({ start: null, end: null });
  const [room, setRoom] = React.useState(rooms.find((r) => r.status !== "soldout")?.id);
  const [guests, setGuests] = React.useState(2);
  const [name, setName] = React.useState("");
  const [done, setDone] = React.useState(null);

  const nights = range.start && range.end ? Math.round((range.end - range.start) / 86400000) : 0;
  const roomObj = rooms.find((r) => r.id === room);
  const total = roomObj && nights ? roomObj.price * nights : 0;
  const fmt = (d) => d ? `${d.getMonth() + 1}/${d.getDate()}` : "—";
  const canSubmit = nights > 0 && room && name.trim();

  const submit = (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    const booking = { range, nights, room: roomObj, guests, name: name.trim(), total };
    setDone(booking);
    onSubmit && onSubmit(booking);
  };

  const stepBtn = {
    width: 36, height: "var(--control-h)", border: "1px solid var(--c-border-strong)", background: "var(--c-surface)",
    cursor: "pointer", fontSize: "1.1rem", color: "var(--c-text-muted)", borderRadius: "var(--radius-control)",
  };

  if (done) {
    return (
      <div style={{ fontFamily: "var(--font-body)", display: "flex", flexDirection: "column", gap: "1rem", ...style }}>
        <StatusBadge status="confirmed" />
        <h3 style={{ fontFamily: "var(--font-heading)", fontSize: "var(--text-h2)", margin: 0, color: "var(--c-text)" }}>
          {done.name}，訂房已確認
        </h3>
        <p style={{ margin: 0, color: "var(--c-text-muted)" }}>
          {done.room.name} · {fmt(done.range.start)}–{fmt(done.range.end)} · {done.nights} 晚 · {done.guests} 位 · NT${done.total}
        </p>
        <div><Button variant="outline" size="sm" onClick={() => setDone(null)}>修改訂房</Button></div>
      </div>
    );
  }

  return (
    <form onSubmit={submit} style={{ fontFamily: "var(--font-body)", display: "flex", flexDirection: "column", gap: "var(--space-6)", ...style }}>
      <div>
        <Label>入住 — 退房 · Stay dates</Label>
        <DateRangePicker value={range} onChange={setRange} fullDates={fullDates} months={1} />
        {nights ? <div style={{ marginTop: "0.6rem", fontSize: "var(--text-sm)", color: "var(--c-text-muted)" }}>{fmt(range.start)} → {fmt(range.end)} · 共 {nights} 晚</div> : null}
      </div>

      <div>
        <Label>房型 · Room type</Label>
        <div style={{ display: "flex", flexDirection: "column", gap: "0.5rem" }}>
          {rooms.map((r) => {
            const out = r.status === "soldout";
            const on = room === r.id;
            return (
              <button key={r.id} type="button" disabled={out} onClick={() => setRoom(r.id)} aria-pressed={on}
                style={{
                  display: "flex", alignItems: "center", gap: "0.9rem", textAlign: "left",
                  padding: "0.7rem 0.9rem", cursor: out ? "not-allowed" : "pointer", fontFamily: "var(--font-body)",
                  background: on ? "var(--c-surface-2)" : "transparent", opacity: out ? 0.6 : 1,
                  border: `1px solid ${on ? "var(--c-primary)" : "var(--c-border-strong)"}`, borderRadius: "var(--radius-control)",
                }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: "0.98rem", fontWeight: "var(--fw-semibold)", color: "var(--c-text)" }}>{r.name}</div>
                  <div style={{ fontSize: "var(--text-sm)", color: "var(--c-text-subtle)" }}>{r.note}</div>
                </div>
                <span style={{ fontFamily: "var(--font-heading)", fontStyle: "italic", fontWeight: "var(--fw-semibold)", fontSize: "var(--text-h4)", color: "var(--c-accent)" }}>NT${r.price}</span>
                <StatusBadge status={out ? "soldout" : "bookable"} />
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ display: "flex", gap: "var(--space-6)", flexWrap: "wrap", alignItems: "flex-end" }}>
        <div>
          <Label>人數 · Guests</Label>
          <div style={{ display: "inline-flex", alignItems: "center", gap: "0.6rem" }}>
            <button type="button" style={stepBtn} onClick={() => setGuests(Math.max(1, guests - 1))} aria-label="−">−</button>
            <span style={{ minWidth: 26, textAlign: "center", fontFamily: "var(--font-heading)", fontSize: "var(--text-h4)", color: "var(--c-text)" }}>{guests}</span>
            <button type="button" style={stepBtn} onClick={() => setGuests(Math.min(maxGuests, guests + 1))} aria-label="+">+</button>
          </div>
        </div>
        <div style={{ flex: 1, minWidth: 200 }}><Input label="姓名 · Name" placeholder="王小明" value={name} onChange={(e) => setName(e.target.value)} /></div>
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: "1rem", flexWrap: "wrap" }}>
        <div style={{ fontFamily: "var(--font-body)", color: "var(--c-text-muted)" }}>
          {nights ? <>合計 <span style={{ fontFamily: "var(--font-heading)", fontStyle: "italic", fontWeight: "var(--fw-semibold)", fontSize: "var(--text-h3)", color: "var(--c-accent)" }}>NT${total}</span> · {nights} 晚</> : "請選擇入住日期"}
        </div>
        <Button type="submit" variant="primary" disabled={!canSubmit}>確認訂房 · Confirm booking</Button>
      </div>
    </form>
  );
}

function Label({ children }) {
  return <div style={{ fontFamily: "var(--font-body)", fontSize: "var(--text-sm)", fontWeight: "var(--fw-semibold)", color: "var(--c-text)", marginBottom: "0.6rem" }}>{children}</div>;
}

/**
 * Hearth Studio — Gallery (Media)
 * Large main image with a thumbnail strip. Click/keyboard to switch.
 * Images adopt the theme photo tone. Accepts URLs or custom nodes.
 */
function Gallery({
  images = [],            // [{ src?, node?, label?, alt? }]
  ratio = "4 / 3",
  thumbs = true,
  start = 0,
  style = {},
}) {
  const [i, setI] = React.useState(start);
  const cur = images[i] || {};
  const renderMedia = (img, main) => img.node
    ? img.node
    : img.src
      ? <img src={img.src} alt={img.alt || ""} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block", filter: "var(--photo-filter)" }} />
      : <Placeholder label={img.label} main={main} />;

  return (
    <div style={{ ...style }}>
      <div style={{ position: "relative", aspectRatio: ratio, overflow: "hidden", background: "var(--photo-bg)", borderRadius: "var(--radius-card)" }}>
        {renderMedia(cur, true)}
        {images.length > 1 ? (
          <div style={{ position: "absolute", bottom: 10, right: 12, display: "flex", gap: 5 }}>
            {images.map((_, n) => (
              <span key={n} style={{ width: 6, height: 6, borderRadius: 999, background: n === i ? "var(--c-on-accent)" : "color-mix(in oklab, var(--c-on-accent) 45%, transparent)" }} />
            ))}
          </div>
        ) : null}
      </div>

      {thumbs && images.length > 1 ? (
        <div style={{ display: "flex", gap: "var(--space-2)", marginTop: "var(--space-3)", flexWrap: "wrap" }}>
          {images.map((img, n) => (
            <button
              key={n}
              type="button"
              onClick={() => setI(n)}
              aria-label={`View image ${n + 1}`}
              aria-pressed={n === i}
              style={{
                width: 72, height: 56, padding: 0, overflow: "hidden", cursor: "pointer",
                background: "var(--photo-bg)", borderRadius: "var(--radius-control)",
                border: `2px solid ${n === i ? "var(--c-accent)" : "transparent"}`,
                opacity: n === i ? 1 : 0.7, transition: "opacity var(--dur-1) var(--ease-out), border-color var(--dur-1) var(--ease-out)",
              }}
            >
              {renderMedia(img, false)}
            </button>
          ))}
        </div>
      ) : null}
    </div>
  );
}

function Placeholder({ label, main }) {
  return (
    <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", filter: "var(--photo-filter)" }}>
      {main && label ? (
        <span style={{ fontFamily: "var(--font-heading)", fontStyle: "italic", fontSize: "var(--text-h4)", color: "rgba(255,255,255,.85)" }}>{label}</span>
      ) : null}
    </div>
  );
}

// ===== components/feedback/Skeleton.jsx =====
/**
 * Hearth Studio — Skeleton (Feedback)
 * Loading placeholder with a slow, quiet shimmer (house motion = unhurried).
 * Variants: line / block / circle. Compose several to mimic a card.
 */
function Skeleton({
  variant = "line",
  width,
  height,
  lines = 1,
  style = {},
}) {
  const base = {
    background: "linear-gradient(90deg, var(--c-surface-2) 25%, color-mix(in oklab, var(--c-surface-2) 55%, var(--c-surface)) 50%, var(--c-surface-2) 75%)",
    backgroundSize: "200% 100%",
    animation: "hearth-shimmer 1.6s var(--ease-soft) infinite",
    borderRadius: "var(--radius-control)",
  };

  const Style = () => (
    <style>{`@keyframes hearth-shimmer { from { background-position: 200% 0 } to { background-position: -200% 0 } }
      @media (prefers-reduced-motion: reduce) { .hearth-sk { animation: none !important } }`}</style>
  );

  if (variant === "circle") {
    const d = width || height || 44;
    return <><Style /><div className="hearth-sk" style={{ ...base, width: d, height: d, borderRadius: "999px", ...style }} /></>;
  }
  if (variant === "block") {
    return <><Style /><div className="hearth-sk" style={{ ...base, width: width || "100%", height: height || 160, borderRadius: "var(--radius-card)", ...style }} /></>;
  }
  // line(s)
  return (
    <>
      <Style />
      <div style={{ display: "flex", flexDirection: "column", gap: "0.55rem", ...style }}>
        {Array.from({ length: lines }, (_, i) => (
          <div key={i} className="hearth-sk" style={{ ...base, height: height || 13, width: width || (i === lines - 1 && lines > 1 ? "60%" : "100%") }} />
        ))}
      </div>
    </>
  );
}

/** Convenience: a card-shaped skeleton (cover + title + two lines). */
function SkeletonCard({ style = {} }) {
  return (
    <div style={{ background: "var(--c-surface)", border: "1px solid var(--c-border)", borderRadius: "var(--radius-card)", overflow: "hidden", ...style }}>
      <Skeleton variant="block" height={150} style={{ borderRadius: 0 }} />
      <div style={{ padding: "var(--pad-card)", display: "flex", flexDirection: "column", gap: "0.7rem" }}>
        <Skeleton variant="line" height={20} width="70%" />
        <Skeleton variant="line" lines={2} />
      </div>
    </div>
  );
}
